<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 图标变形动画</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  background: #f5f4ef;
  font-family: system-ui, -apple-system, sans-serif;
}

#stage {
  width: 120px;
  height: 120px;
}

#stage svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 300px;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
}

label {
  font-size: 13px;
  color: #666;
  width: 72px;
  flex-shrink: 0;
}

input[type=range] {
  flex: 1;
  accent-color: #1a1a1a;
}

.val {
  font-size: 13px;
  font-weight: 500;
  min-width: 40px;
  text-align: right;
  color: #1a1a1a;
}

.btn-row {
  display: flex;
  gap: 8px;
  justify-content: center;
}

button {
  padding: 6px 18px;
  font-size: 13px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: #eee; }
button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
</style>
</head>
<body>

<div id="stage">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path id="morphPath" fill="#1a1a1a" d=""/>
  </svg>
</div>

<div class="controls">
  <div class="row">
    <label>动画速度</label>
    <input type="range" id="duration" min="0.5" max="4" step="0.1" value="1.8">
    <span class="val" id="durationVal">1.8s</span>
  </div>
  <div class="row">
    <label>停留时间</label>
    <input type="range" id="hold" min="0" max="2" step="0.1" value="0.6">
    <span class="val" id="holdVal">0.6s</span>
  </div>
  <div class="btn-row">
    <button id="btnPause">暂停</button>
    <button id="btnDot">→ 圆点</button>
    <button id="btnIcon">→ 图标</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flubber@0.4.2/build/flubber.min.js"></script>
<script>
const ICON_PATH = "m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9-4.7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2-2 .2-3 1-1 8-5.5Z";

// 一个小圆点（圆心在图标中心 50,50，半径约3）
const DOT_PATH = "M50,47 a3,3 0 1,0 0,6 a3,3 0 1,0 0,-6 Z";

const morphEl = document.getElementById('morphPath');
let interpolatorToDot = null;
let interpolatorToIcon = null;
let animating = false;
let paused = false;
let rafId = null;
let phase = 'icon'; // 'icon' | 'to-dot' | 'dot' | 'to-icon'
let phaseStart = null;
let duration = 1800;
let hold = 600;

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function buildInterpolators() {
  interpolatorToDot = flubber.interpolate(ICON_PATH, DOT_PATH, { maxSegmentLength: 2 });
  interpolatorToIcon = flubber.interpolate(DOT_PATH, ICON_PATH, { maxSegmentLength: 2 });
}

function loop(ts) {
  if (paused) { rafId = requestAnimationFrame(loop); return; }
  if (!phaseStart) phaseStart = ts;
  const elapsed = ts - phaseStart;

  if (phase === 'to-dot') {
    const t = Math.min(elapsed / duration, 1);
    morphEl.setAttribute('d', interpolatorToDot(easeInOut(t)));
    if (t >= 1) { phase = 'dot'; phaseStart = ts; }
  } else if (phase === 'dot') {
    morphEl.setAttribute('d', DOT_PATH);
    if (elapsed >= hold) { phase = 'to-icon'; phaseStart = ts; }
  } else if (phase === 'to-icon') {
    const t = Math.min(elapsed / duration, 1);
    morphEl.setAttribute('d', interpolatorToIcon(easeInOut(t)));
    if (t >= 1) { phase = 'icon'; phaseStart = ts; }
  } else if (phase === 'icon') {
    morphEl.setAttribute('d', ICON_PATH);
    if (elapsed >= hold) { phase = 'to-dot'; phaseStart = ts; }
  }

  rafId = requestAnimationFrame(loop);
}

function startLoop() {
  if (rafId) cancelAnimationFrame(rafId);
  phaseStart = null;
  rafId = requestAnimationFrame(loop);
  animating = true;
}

function init() {
  buildInterpolators();
  morphEl.setAttribute('d', ICON_PATH);
  startLoop();
}

// 控件
document.getElementById('duration').addEventListener('input', function() {
  duration = parseFloat(this.value) * 1000;
  document.getElementById('durationVal').textContent = parseFloat(this.value).toFixed(1) + 's';
});
document.getElementById('hold').addEventListener('input', function() {
  hold = parseFloat(this.value) * 1000;
  document.getElementById('holdVal').textContent = parseFloat(this.value).toFixed(1) + 's';
});

const btnPause = document.getElementById('btnPause');
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? '继续' : '暂停';
  btnPause.classList.toggle('active', paused);
});

document.getElementById('btnDot').addEventListener('click', () => {
  phase = 'to-dot'; phaseStart = null;
});
document.getElementById('btnIcon').addEventListener('click', () => {
  phase = 'to-icon'; phaseStart = null;
});

// 等 flubber 加载完
window.addEventListener('load', () => {
  if (typeof flubber !== 'undefined') {
    init();
  } else {
    document.querySelector('#stage').innerHTML = '<p style="color:red;font-size:13px">flubber 加载失败，请检查网络</p>';
  }
});
</script>
</body>
</html>
